<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     viewBox="0 0 360 450"
     width="360" height="450"
     style="background: white; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;">

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <text x="180" y="24" text-anchor="middle"
            font-family="Segoe UI, system-ui, sans-serif" font-size="16" font-weight="700"
            fill="#1B1B1B">Tiny Test</text>

  <g transform="translate(0, 40)">
    <!-- Groups (background) -->
    

    <!-- Edges -->
    
    <g class="edge" data-from="Web" data-to="DB">
      <path d="M 140 110 L 140 150 L 140 190" fill="none" stroke="#0078D4" stroke-width="1.5"
             />
      <polygon points="140,190 136.1058165769135,180.78939005997114 143.8941834230865,180.78939005997114" fill="#0078D4" />
      
    </g>

    <!-- Nodes (foreground) -->
    
    <!-- Web -->
    <g class="node" data-service="Web" data-type="App Service">
      <!-- Shadow -->
      <rect x="42" y="42" width="200" height="70"
            rx="8" fill="#00000010" />
      <!-- Card -->
      <rect x="40" y="40" width="200" height="70"
            rx="8" fill="white" stroke="#0078D4" stroke-width="2" />
      <!-- Color accent bar -->
      <rect x="40" y="40" width="6" height="70"
            rx="3" fill="#0078D4" />
      <!-- Icon + Name -->
      <text x="58" y="68" font-family="Segoe UI, system-ui, sans-serif"
            font-size="13" font-weight="600" fill="#1B1B1B">
        🌐 Web
      </text>
      <!-- Type badge -->
      <text x="58" y="88" font-family="Segoe UI, system-ui, sans-serif"
            font-size="11" fill="#0078D4">
        App Svc
      </text>
    </g>

    <!-- DB -->
    <g class="node" data-service="DB" data-type="SQL Database">
      <!-- Shadow -->
      <rect x="42" y="192" width="200" height="70"
            rx="8" fill="#00000010" />
      <!-- Card -->
      <rect x="40" y="190" width="200" height="70"
            rx="8" fill="white" stroke="#0B8043" stroke-width="2" />
      <!-- Color accent bar -->
      <rect x="40" y="190" width="6" height="70"
            rx="3" fill="#0B8043" />
      <!-- Icon + Name -->
      <text x="58" y="218" font-family="Segoe UI, system-ui, sans-serif"
            font-size="13" font-weight="600" fill="#1B1B1B">
        🗄️ DB
      </text>
      <!-- Type badge -->
      <text x="58" y="238" font-family="Segoe UI, system-ui, sans-serif"
            font-size="11" fill="#0B8043">
        SQL DB
      </text>
    </g>
  </g>

  <!-- Legend -->
  <text x="20" y="400" font-family="Segoe UI, system-ui, sans-serif" 
                    font-size="10" fill="#666">🌐 app services</text>
<text x="180" y="400" font-family="Segoe UI, system-ui, sans-serif" 
                    font-size="10" fill="#666">🗄️ databases</text>

  <!-- Watermark -->
  <text x="350" y="442" text-anchor="end"
        font-family="Segoe UI, system-ui, sans-serif" font-size="9" fill="#CCC">
    Generated by Azure Architecture Diagram Builder
  </text>
</svg>
