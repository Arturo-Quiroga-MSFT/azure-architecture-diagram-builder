name: Azure Diagram Builder — provision & deploy (azd)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'Architecture_validations/**'
      - 'Azure_generated_diagrams/**'
      - 'Azure_generated_bicep_templates/**'
      - 'prompts/**'
      - 'notebooks/**'

# Required for OIDC federated identity (passwordless login)
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up azd environment
        run: |
          azd env new "$AZURE_ENV_NAME" --no-prompt
          # Azure OpenAI (bring-your-own resource)
          azd env set AZURE_OPENAI_ENDPOINT         "${{ secrets.AZURE_OPENAI_ENDPOINT }}"
          azd env set AZURE_OPENAI_API_KEY          "${{ secrets.AZURE_OPENAI_API_KEY }}"
          azd env set AZURE_OPENAI_DEPLOYMENT_NAME  "${{ vars.AZURE_OPENAI_DEPLOYMENT_NAME }}"
          azd env set AZURE_OPENAI_DEPLOYMENT_GPT52        "${{ vars.AZURE_OPENAI_DEPLOYMENT_GPT52 }}"
          azd env set AZURE_OPENAI_DEPLOYMENT_GPT52CODEX   "${{ vars.AZURE_OPENAI_DEPLOYMENT_GPT52CODEX }}"
          azd env set AZURE_OPENAI_DEPLOYMENT_GPT53CODEX   "${{ vars.AZURE_OPENAI_DEPLOYMENT_GPT53CODEX }}"
          azd env set AZURE_OPENAI_DEPLOYMENT_GPT54        "${{ vars.AZURE_OPENAI_DEPLOYMENT_GPT54 }}"
          azd env set AZURE_OPENAI_DEPLOYMENT_GPT54MINI    "${{ vars.AZURE_OPENAI_DEPLOYMENT_GPT54MINI }}"
          azd env set AZURE_OPENAI_DEPLOYMENT_DEEPSEEK     "${{ vars.AZURE_OPENAI_DEPLOYMENT_DEEPSEEK }}"
          azd env set AZURE_OPENAI_DEPLOYMENT_GROK4FAST    "${{ vars.AZURE_OPENAI_DEPLOYMENT_GROK4FAST }}"
          # Speech region (for avatar presenter)
          azd env set AZURE_SPEECH_REGION "${{ vars.AZURE_SPEECH_REGION }}"

      - name: Provision infrastructure
        run: azd provision --no-prompt

      - name: Deploy application
        run: azd deploy --no-prompt
