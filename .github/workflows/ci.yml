name: CI

# Build verification for the app (and MCP server) on every push and PR.
# Catches "forgot to commit a file" and type errors before they reach a
# collaborator's clone.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build (Vite app)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (tsc + vite)
        run: npm run build

      - name: Verify generated files are committed
        run: git diff --exit-code

  build-mcp:
    name: Build (MCP server)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        working-directory: mcp-server
        run: npm ci

      - name: Test catalog
        working-directory: mcp-server
        run: npm test

      - name: Build
        working-directory: mcp-server
        run: npm run build

      - name: Smoke-test local MCP server
        working-directory: mcp-server
        run: npm run test:smoke

      - name: Verify generated files are committed
        run: git diff --exit-code
